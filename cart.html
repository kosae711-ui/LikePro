<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #0f172a; color: white; padding: 20px; font-family: sans-serif;">
    <div id="cart-list" style="max-width: 600px; margin: 30px auto; background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155;">
        <h2 style="text-align: center; color: #38bdf8;">سلة المشتريات</h2>
        <div id="items-container"></div>
        <hr id="cart-divider" style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
        <div id="checkout-actions" style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="total-price" style="margin: 0; font-size: 20px;">الإجمالي: 0 ﷼</h3>
            <button onclick="window.location.href='checkout.html'" style="padding: 12px 20px; background: #22c55e; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">ادفع الآن</button>
        </div>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#94a3b8; text-decoration: none;">العودة للمتجر</a>
    </div>

    <script>
        function renderCart() {
            // جلب البيانات من localStorage في كل مرة يتم فيها تحديث السلة
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            let container = document.getElementById('items-container');
            container.innerHTML = ""; 
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 40px 0; opacity: 0.5;"><svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.5"><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><h3>سلتك فارغة</h3></div>`;
                document.getElementById('checkout-actions').style.display = 'none';
                document.getElementById('cart-divider').style.display = 'none';
            } else {
                document.getElementById('checkout-actions').style.display = 'flex';
                document.getElementById('cart-divider').style.display = 'block';
                
                cart.forEach((item, index) => {
                    total += parseFloat(item.price);
                    container.innerHTML += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
                            <div style="font-size: 18px;"><strong>${item.name}</strong><br><span style="color: #38bdf8;">${item.price} ﷼</span></div>
                            <button onclick="removeItem(${index})" style="background: #ef4444; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer;">حذف</button>
                        </div>`;
                });
                document.getElementById('total-price').innerText = "الإجمالي: " + total.toFixed(2) + " ﷼";
            }
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart(); // إعادة عرض السلة بعد الحذف
        }

        renderCart();
    </script>
</body>
</html>
